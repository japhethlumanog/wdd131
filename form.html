<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description" content="">
    <meta name="author" content="Japheth James D. Lumanog">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <form action="review.html" method="get">
        <label for="productOption">Product Name</label>
        <select name="productOption" id="productOption" required>
            <option value="selectProduct" disabled selected>Select a Product</option>
        </select>

        <fieldset class="rating">
            <legend>Overall Rating</legend>

            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5" title="5 stars">★</label>

            <input type="radio" id="star4" name="rating" value="4">
            <label for="star4" title="4 stars">★</label>

            <input type="radio" id="star3" name="rating" value="3">
            <label for="star3" title="3 stars">★</label>

            <input type="radio" id="star2" name="rating" value="2">
            <label for="star2" title="2 stars">★</label>

            <input type="radio" id="star1" name="rating" value="1">
            <label for="star1" title="1 star">★</label>
        </fieldset>

        <label for="install-date">Date of Installation</label>
        <input 
        type="date" 
        id="install-date" 
        name="install-date" 
        required>

        <fieldset class="checkbox-group">
            <legend>Useful Features</legend>

            <label for="speed">
                <input type="checkbox" id="speed" name="features" value="speed">
                Speed
            </label>

            <label for="durability">
                <input type="checkbox" id="durability" name="features" value="durability">
                Durability
            </label>

            <label for="design">
                <input type="checkbox" id="design" name="features" value="design">
                Design
            </label>

            <label for="efficiency">
                <input type="checkbox" id="efficiency" name="features" value="efficiency">
                Efficiency
            </label>
        </fieldset>

        <label for="review">Written Review</label>
        <textarea id="review" name="review"></textarea>

        <label for="username">Your Name</label>
        <input id="username" name="username" type="text">
        <button type="submit">Submit Review</button>
    </form>
    <div class="topBorder"></div>
    <footer>
        <p>
            &copy; <span id="currentYear"></span> | Japheth James D. Lumanog | The Philippines
        </p>

        <p id="lastModified"></p>

    </footer>
    
    
</body>
</html>
