<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chocolate Bliss | Review</title>
  <meta name="description" content="Submit a review for Chocolate Bliss products.">
  <link rel="stylesheet" href="styles/styles.css">
  <script src="scripts/scripts.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img src="../images/logo.svg" alt="Chocolate Bliss logo" class="brand-logo">
      <div>
        <p class="eyebrow">Chocolate Bliss</p>
        <h1>Product Review</h1>
      </div>
    </div>
    <nav aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="references.html">References</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <div>
        <p class="eyebrow">Share your experience</p>
        <h2>Tell us about your favorite chocolate.</h2>
        <p>Your feedback helps us improve our handcrafted treats.</p>
      </div>
      <form method="get" action="review.html">
        <div class="form-group">
          <label for="product">Product</label>
          <select id="product" name="product" required>
            <option value="" disabled selected>Select a product</option>
            <option value="dark-bar">Dark Chocolate Bar</option>
            <option value="milk-bar">Milk Chocolate Bar</option>
            <option value="truffles">Chocolate Truffles</option>
            <option value="strawberries">Chocolate Covered Strawberries</option>
            <option value="mix">Hot Chocolate Mix</option>
            <option value="cookies">Chocolate Cookies</option>
          </select>
        </div>
        <fieldset class="rating">
          <legend>Rating</legend>
          <div class="stars">
            <input type="radio" id="star1" name="rating" value="1" required>
            <label for="star1" title="1 star">★</label>
            <input type="radio" id="star2" name="rating" value="2" required>
            <label for="star2" title="2 stars">★</label>
            <input type="radio" id="star3" name="rating" value="3" required>
            <label for="star3" title="3 stars">★</label>
            <input type="radio" id="star4" name="rating" value="4" required>
            <label for="star4" title="4 stars">★</label>
            <input type="radio" id="star5" name="rating" value="5" required>
            <label for="star5" title="5 stars">★</label>
          </div>
        </fieldset>
        <div class="form-group">
          <label for="review-date">Review Date</label>
          <input type="date" id="review-date" name="review-date" required>
        </div>
        <div class="form-group">
          <label for="review">Your Review</label>
          <textarea id="review" name="review" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn">Submit Review</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <p>© 2026 Chocolate Bliss. Designed and developed by Japheth James D. Lumanog.</p>
    <a href="references.html">References</a>
  </footer>
</body>
</html>
